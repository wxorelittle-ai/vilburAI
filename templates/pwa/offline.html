{% load static %}<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Офлайн — Бригадир.Про</title>
    <style>
        :root { --sand:#F3EDE4; --grafit:#262421; --terra:#C1502E; --amber:#D89A54; --steel:#6B6862; --deep:#E7DDCE; }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Inter',system-ui,sans-serif; background:var(--sand); color:var(--grafit);
               min-height:100vh; padding:24px; }
        .wrap { max-width:520px; margin:0 auto; }
        .brand { display:flex; align-items:center; gap:10px; margin-bottom:24px; }
        .mark { width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center;
                background:linear-gradient(135deg,var(--terra),var(--amber)); color:#fff; font-weight:800; }
        h1 { font-size:22px; margin:0 0 4px; }
        .muted { color:var(--steel); font-size:14px; }
        .card { background:#fff; border:1px solid var(--deep); border-radius:16px; padding:20px; margin-top:20px;
                box-shadow:0 8px 24px -14px rgba(38,36,33,.25); }
        label { display:block; font-size:12px; color:var(--steel); margin:10px 0 4px; }
        input, select { width:100%; min-height:44px; padding:8px 12px; font-size:14px; border:1px solid var(--deep);
                border-radius:9px; background:#faf7f2; color:var(--grafit); }
        .grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        button { width:100%; margin-top:16px; min-height:52px; border:0; border-radius:12px; background:var(--terra);
                color:#fff; font-weight:700; font-size:16px; cursor:pointer; }
        button:hover { background:#A23F22; }
        #c_result { display:none; margin-top:16px; border-top:1px dashed var(--deep); padding-top:12px; }
        .row { display:flex; justify-content:space-between; padding:6px 0; font-size:14px; }
        .row.floor b { color:var(--terra); }
        a.back { display:inline-block; margin-top:20px; color:var(--terra); font-weight:600; text-decoration:none; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="brand"><span class="mark">Б</span><strong>Бригадир<span style="color:var(--terra)">.Про</span></strong></div>

    <h1>Нет соединения</h1>
    <p class="muted">Похоже, интернет пропал. Часть сервиса доступна офлайн — например, калькулятор себестоимости считает прямо здесь, без сети.</p>

    <div class="card">
        <strong>Калькулятор себестоимости (офлайн)</strong>
        <div class="grid">
            <div><label>Площадь, м²</label><input id="c_ploshad" type="number" step="0.01" value="50"></div>
            <div><label>Рабочих</label><input id="c_rabochih" type="number" value="2"></div>
            <div><label>Дней</label><input id="c_dni" type="number" value="10"></div>
            <div><label>Ставка/день, ₽</label><input id="c_stavka" type="number" value="3000"></div>
            <div><label>Аренда, ₽</label><input id="c_arenda" type="number" value="0"></div>
            <div><label>Доставка, ₽</label><input id="c_dostavka" type="number" value="0"></div>
            <div><label>Расходники, ₽</label><input id="c_rashodniki" type="number" value="0"></div>
            <div><label>Налог</label>
                <select id="c_nalog">
                    <option value="4">Самозанятый — 4%</option>
                    <option value="6">ИП УСН — 6%</option>
                    <option value="0">Наличные — 0%</option>
                </select>
            </div>
        </div>
        <button id="c_calc" type="button">Рассчитать</button>
        <div id="c_result"></div>
    </div>

    <a class="back" href="/dashboard/">↻ Попробовать снова</a>
</div>
<script src="{% static 'js/offline-calc.js' %}"></script>
</body>
</html>
