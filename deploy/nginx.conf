# Nginx-конфигурация для Бригадир.Про (раздел 9 / Этап 6 ТЗ)
# Разместить в /etc/nginx/sites-available/brigadir_pro и включить симлинком
# в /etc/nginx/sites-enabled/, затем: sudo nginx -t && sudo systemctl reload nginx
#
# SSL-сертификат — Let's Encrypt через certbot:
#   sudo certbot --nginx -d brigadir.pro -d www.brigadir.pro
# (certbot сам допишет блоки ssl_certificate ниже при первом запуске)

limit_req_zone $binary_remote_addr zone=brigadir_login:10m rate=5r/m;

server {
    listen 80;
    server_name brigadir.pro www.brigadir.pro;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name brigadir.pro www.brigadir.pro;

    # ssl_certificate     /etc/letsencrypt/live/brigadir.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/brigadir.pro/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 10M;  # логотипы, фото-акты (Addendum №1)

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    access_log /var/log/nginx/brigadir_pro-access.log;
    error_log  /var/log/nginx/brigadir_pro-error.log;

    location /static/ {
        alias /opt/brigadir_pro/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/brigadir_pro/media/;
        expires 7d;
    }

    location /login/ {
        limit_req zone=brigadir_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params_brigadir;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        include /etc/nginx/proxy_params_brigadir;
    }
}
